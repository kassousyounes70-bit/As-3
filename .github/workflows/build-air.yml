name: Build Nosta Player

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2"
          accept-license: true

      - name: Compile ActionScript
        run: amxmlc src/Main.as -output src/main.swf

      - name: Generate Certificate
        run: adt -certificate -validityPeriod 25 -cn NCore 2048-RSA cert.p12 password

      - name: Build APK (64-bit)
        run: adt -package -target apk-captive-runtime -arch armv8 -storetype pkcs12 -keystore cert.p12 -storepass password NostaPlayer.apk src/application.xml -C src main.swf

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NostaPlayer-Release
          path: NostaPlayer.apk
          retention-days: 30
