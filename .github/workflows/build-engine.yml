name: Build Nostagames Engine (AIR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AIR SDK Compiler
        run: npm install -g @airsdk/compiler

      - name: Compile AS3 to SWF
        run: npx @airsdk/compiler amxmlc Main.as -output Main.swf

      - name: Generate Security Certificate
        run: npx @airsdk/compiler adt -certificate -validityPeriod 25 -dir CN=Nostagames 2048-RSA cert.p12 password

      - name: Package APK
        run: npx @airsdk/compiler adt -package -target apk-captive-runtime -storetype pkcs12 -keystore cert.p12 -storepass password NostagamesEngine.apk NostagamesEngine-app.xml Main.swf

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nostagames-Engine-APK
          path: NostagamesEngine.apk
          retention-days: 30
          
