name: Build Nostagames Engine (AIR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download and Setup AIR SDK Manually
        run: |
          $urls = @(
              "https://airsdk.harman.com/assets/downloads/33.1.1.932/AIRSDK_Compiler.zip",
              "https://airdownload.adobe.com/air/win/download/32.0/AIRSDK_Compiler.zip"
          )
          
          foreach ($url in $urls) {
              try {
                  Write-Host "Attempting to download from: $url"
                  Invoke-WebRequest -Uri $url -OutFile "airsdk.zip" -ErrorAction Stop
                  Write-Host "Download successful!"
                  break
              } catch {
                  Write-Host "Download failed from this URL, trying fallback..."
              }
          }
          
          Write-Host "Extracting archive..."
          Expand-Archive -Path "airsdk.zip" -DestinationPath "airsdk" -Force
          
          Write-Host "Injecting compiler paths to system environment..."
          $binPath = "$((Get-Item .).FullName)\airsdk\bin"
          echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Verify Compiler Core
        run: |
          amxmlc -version
          adt -version

      - name: Compile ActionScript to SWF
        run: amxmlc Main.as -output Main.swf

      - name: Generate Security Certificate
        run: adt -certificate -validityPeriod 25 -dir CN=Nostagames 2048-RSA cert.p12 password

      - name: Package APK
        run: adt -package -target apk-captive-runtime -storetype pkcs12 -keystore cert.p12 -storepass password NostagamesEngine.apk NostagamesEngine-app.xml Main.swf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nostagames-Engine-APK
          path: NostagamesEngine.apk
          retention-days: 30
