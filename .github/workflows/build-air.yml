name: Build AIR APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install 32-bit libraries for AAPT
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libstdc++6:i386 zlib1g:i386

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "50.2"
          accept-license: true

      - name: Generate Certificate
        run: adt -certificate -validityPeriod 25 -cn NCore 2048-RSA cert.p12 password

      - name: Build APK
        run: adt -package -target apk-captive-runtime -storetype pkcs12 -keystore cert.p12 -storepass password ShopEmpire.apk src/application.xml -C src main.swf

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShopEmpire-Release
          path: ShopEmpire.apk
          retention-days: 30
